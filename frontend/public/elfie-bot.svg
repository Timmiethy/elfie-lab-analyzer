<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Elfie healthcare assistant">
  <defs>
    <linearGradient id="elfieBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1570" />
      <stop offset="100%" stop-color="#FF6FA1" />
    </linearGradient>
    <linearGradient id="elfieHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFE6EE" />
    </linearGradient>
    <linearGradient id="elfieBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFD3E0" />
    </linearGradient>
    <radialGradient id="elfieCheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF87AE" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FF87AE" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Rounded pink background -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#elfieBg)" />

  <!-- Antenna -->
  <line x1="32" y1="11" x2="32" y2="16" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
  <circle cx="32" cy="10" r="2.2" fill="#FFFFFF" />
  <circle cx="32" cy="10" r="1" fill="#FF1570" />

  <!-- Body (rounded stethoscope-ish chest) -->
  <rect x="17" y="39" width="30" height="16" rx="7" fill="url(#elfieBody)" stroke="#FF1570" stroke-width="1.2" />
  <!-- Body medical cross -->
  <rect x="29.5" y="43" width="5" height="9" rx="1.2" fill="#FF1570" />
  <rect x="27" y="45.5" width="10" height="4" rx="1.2" fill="#FF1570" />

  <!-- Neck -->
  <rect x="29.5" y="36" width="5" height="4" rx="1.2" fill="#FFE6EE" stroke="#FF1570" stroke-width="1" />

  <!-- Head -->
  <rect x="14" y="16" width="36" height="22" rx="11" fill="url(#elfieHead)" stroke="#FF1570" stroke-width="1.4" />

  <!-- Cheeks -->
  <circle cx="19" cy="30" r="3.2" fill="url(#elfieCheek)" />
  <circle cx="45" cy="30" r="3.2" fill="url(#elfieCheek)" />

  <!-- Eyes -->
  <g fill="#2B1B36">
    <circle cx="25" cy="27" r="2.6" />
    <circle cx="39" cy="27" r="2.6" />
  </g>
  <!-- Eye highlights -->
  <g fill="#FFFFFF">
    <circle cx="26" cy="26" r="0.9" />
    <circle cx="40" cy="26" r="0.9" />
  </g>

  <!-- Smile -->
  <path d="M28 32 Q32 35 36 32" stroke="#FF1570" stroke-width="1.6" fill="none" stroke-linecap="round" />

  <!-- Heart on forehead -->
  <path
    d="M32 20.5
       c -1.4 -2.2 -4.8 -1.3 -4.8 1.2
       c 0 1.9 2.1 3.2 4.8 4.8
       c 2.7 -1.6 4.8 -2.9 4.8 -4.8
       c 0 -2.5 -3.4 -3.4 -4.8 -1.2 Z"
    fill="#FF1570"
  />
</svg>

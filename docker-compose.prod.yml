services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elfie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-elfie_labs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - elfie-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elfie} -d ${POSTGRES_DB:-elfie_labs}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # DB not exposed to host; backend reaches it via docker network only.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: elfie-backend:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ELFIE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-elfie}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-elfie_labs}
      ELFIE_DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-elfie}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-elfie_labs}
      PORT: "8000"
      WEB_CONCURRENCY: "2"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - elfie-net
    volumes:
      - artifacts:/app/artifacts
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=2).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - elfie-net
    depends_on:
      - backend

volumes:
  pgdata:
  artifacts:
  caddy_data:
  caddy_config:

networks:
  elfie-net:
    driver: bridge

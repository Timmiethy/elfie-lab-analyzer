services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elfie
      POSTGRES_PASSWORD: elfie
      POSTGRES_DB: elfie_labs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elfie -d elfie_labs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ELFIE_DATABASE_URL: postgresql+asyncpg://elfie:elfie@db:5432/elfie_labs
      ELFIE_DATABASE_URL_SYNC: postgresql://elfie:elfie@db:5432/elfie_labs
      ELFIE_LOINC_PATH: /app/data/loinc
      ELFIE_TERMINOLOGY_SNAPSHOT_PATH: /app/data/loinc
      ELFIE_ALIAS_TABLES_PATH: /app/data/alias_tables
      ELFIE_UCUM_PATH: /app/data/ucum
      ELFIE_FAMILY_CONFIG_REGISTRY_PATH: /app/data/family_configs/document_family_registry_v1.json
      ELFIE_ARTIFACT_STORE_PATH: /app/artifacts
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  pgdata:

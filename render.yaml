# Render blueprint for Elfie Lab Analyzer backend + Postgres.
# Deploy: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub.
#   2. Render dashboard -> New -> Blueprint -> pick repo.
#   3. Set secret env vars marked `sync: false` manually in dashboard.
#   4. Click Apply.

databases:
  - name: elfie-labs-db
    plan: basic-256mb        # 1 GB storage, upgrade for prod
    databaseName: elfie_labs
    user: elfie
    postgresMajorVersion: "16"

services:
  - type: web
    name: elfie-labs-backend
    runtime: docker
    plan: starter             # 512MB; scale to standard (2GB) for VLM workloads
    region: oregon            # match DB region
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      # --- Database (auto-wired from blueprint DB) ---
      - key: ELFIE_DATABASE_URL
        fromDatabase:
          name: elfie-labs-db
          property: connectionString
      - key: ELFIE_DATABASE_URL_SYNC
        fromDatabase:
          name: elfie-labs-db
          property: connectionString
      # Render exposes postgresql:// — async driver needs postgresql+asyncpg://.
      # docker_start.sh rewrites scheme at boot (see scripts/docker_start.sh).

      # --- Qwen LLM ---
      - key: ELFIE_QWEN_API_KEY
        sync: false
      - key: ELFIE_QWEN_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: ELFIE_QWEN_MODEL
        value: qwen-turbo
      - key: ELFIE_QWEN_VL_MODEL
        value: qwen3-vl-flash-2026-01-22

      # --- Feature toggles ---
      - key: ELFIE_IMAGE_BETA_ENABLED
        value: "true"
      - key: ELFIE_MAX_UPLOAD_SIZE_MB
        value: "20"
      - key: ELFIE_MAX_PDF_PAGES
        value: "30"

      # --- Auth (MUST set secrets in dashboard) ---
      - key: ELFIE_SUPABASE_JWT_SECRET
        sync: false
      - key: ELFIE_SUPABASE_URL
        sync: false
      - key: ELFIE_DEV_AUTH_BYPASS
        value: "false"

      # --- CORS (update to your Vercel production domain) ---
      - key: ELFIE_CORS_ORIGINS
        value: '["https://elfie-labs.vercel.app"]'
      - key: ELFIE_CORS_ALLOW_CREDENTIALS
        value: "true"

      # --- Hardening ---
      - key: ELFIE_DEBUG
        value: "false"
      - key: ELFIE_ALLOW_DEBUG_ARTIFACTS
        value: "false"
